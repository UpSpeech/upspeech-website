[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Skip prerender for deploy previews (no Chrome on Netlify CI)
[context.deploy-preview]
  command = "node scripts/generate-og-images.mjs && vite build"

[[redirects]]
  from = "https://upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

# Mobile-app deep-link redirect. Mobile intercepts via Universal Links / App
# Links before the 302 fires; web users fall through to the tenant SPA. See
# decisions/2026-05-18-apex-deep-link-redirect.md.
[[redirects]]
  from = "/r/:tenant/*"
  to = "https://:tenant.upspeech.app/:splat"
  status = 302
  force = true

# Same redirect for the bare `/r/<tenant>` form (no trailing path or splat).
[[redirects]]
  from = "/r/:tenant"
  to = "https://:tenant.upspeech.app/"
  status = 302
  force = true

# SPA fallback: serve index.html for all routes (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom headers for SEO, security, and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Mirrors the <meta> CSP in index.html, promoted to a real response header
    # so frame-ancestors and form-action are enforced (a <meta> CSP cannot set
    # them). frame-ancestors 'none' matches X-Frame-Options: DENY above.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://www.googletagmanager.com https://*.clarity.ms https://c.bing.com https://eu-assets.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.clarity.ms; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://upspeech.app https://c.bing.com https://*.clarity.ms; connect-src 'self' http://localhost:3050 https://app-backend-production-f30a.up.railway.app https://*.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://*.clarity.ms https://c.bing.com https://eu.i.posthog.com https://eu-assets.i.posthog.com; script-src-elem 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.clarity.ms https://eu-assets.i.posthog.com; frame-ancestors 'none'; form-action 'self'"

# Universal Links / Android App Links manifests.
# AASA has no file extension; force application/json so iOS accepts it.
# See decisions/2026-05-18-apex-deep-link-redirect.md.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

# Cache static assets aggressively (Vite adds content hashes to filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/screenshots/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Ensure robots.txt and sitemap.xml are always fresh
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
