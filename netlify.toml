[build]
  command = "npm run build"
  publish = "dist"

# Skip prerender for deploy previews (no Chrome on Netlify CI)
[context.deploy-preview]
  command = "node scripts/generate-og-images.mjs && vite build"

[[redirects]]
  from = "https://upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.upspeechapp.com/*"
  to = "https://upspeech.app/:splat"
  status = 301
  force = true

# Mobile-app deep-link redirect. Mobile intercepts via Universal Links / App
# Links before the 302 fires; web users fall through to the tenant SPA. See
# decisions/2026-05-18-apex-deep-link-redirect.md.
[[redirects]]
  from = "/r/:tenant/*"
  to = "https://:tenant.upspeech.app/:splat"
  status = 302
  force = true

# Same redirect for the bare `/r/<tenant>` form (no trailing path or splat).
[[redirects]]
  from = "/r/:tenant"
  to = "https://:tenant.upspeech.app/"
  status = 302
  force = true

# SPA fallback: serve index.html for all routes (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # Configure secrets scanning to ignore EmailJS environment variables
  # These are public keys meant to be exposed in the client-side bundle
  # The actual values are set in Netlify UI under Environment Variables
  SECRETS_SCAN_OMIT_KEYS = "VITE_EMAILJS_SERVICE_ID,VITE_EMAILJS_TEMPLATE_ID,VITE_EMAILJS_PUBLIC_KEY"

# Custom headers for SEO and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Universal Links / Android App Links manifests.
# AASA has no file extension; force application/json so iOS accepts it.
# See decisions/2026-05-18-apex-deep-link-redirect.md.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

# Cache static assets aggressively (Vite adds content hashes to filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/screenshots/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Ensure robots.txt and sitemap.xml are always fresh
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
